name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (build, lint, unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  models:
    name: Model contracts (ONNX <-> app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install onnxruntime numpy pytest
      - run: pytest tests/ -q
